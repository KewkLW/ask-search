# SearxNG settings for ask-search
# Uses default settings as base, overrides only what we need

use_default_settings: true

general:
  debug: false
  instance_name: "ask-search"

server:
  secret_key: "ultrasecretkey"
  bind_address: "0.0.0.0"
  port: 8080
  limiter: false
  image_proxy: false

search:
  safe_search: 0
  formats:
    - html
    - json
